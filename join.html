<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join a Picklr league</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; padding: 24px 20px 60px;
      background: #faf8f3; color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6; font-size: 16px;
      display: flex; min-height: 90vh; align-items: center; justify-content: center;
    }
    main { max-width: 560px; text-align: center; }
    h1 { font-size: 34px; margin: 8px 0 4px; letter-spacing: -1px; }
    .tag { color: #555; font-size: 17px; margin-bottom: 24px; }
    .ball { font-size: 44px; }
    .code-card {
      background: #fff; border: 1.5px solid #1a1a1a; border-radius: 16px;
      padding: 18px 24px; margin: 18px auto 6px; display: inline-block;
    }
    .code-label { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 34px; font-weight: 700; letter-spacing: 4px; margin: 4px 0;
    }
    .copy-btn {
      background: none; border: none; color: #5a7d00; font-size: 14px;
      cursor: pointer; padding: 4px 8px; font-family: inherit;
    }
    .btn {
      display: block; max-width: 320px; margin: 14px auto 0; padding: 14px 20px;
      border-radius: 14px; font-size: 17px; font-weight: 600; text-decoration: none;
    }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-secondary { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; }
    .hint { color: #666; font-size: 14px; margin-top: 22px; }
    .links { margin-top: 30px; font-size: 13px; }
    .links a { color: #5a7d00; margin: 0 10px; }
  </style>
</head>
<body>
<main>
  <div class="ball">🥒🎾</div>
  <h1>You're invited!</h1>
  <p class="tag" id="tagline">Join the league on Picklr — log games, climb the rankings,
  and settle who's actually the best.</p>

  <div class="code-card" id="codeCard" hidden>
    <div class="code-label">League invite code</div>
    <div class="code" id="codeText"></div>
    <button class="copy-btn" id="copyBtn" type="button">Copy code</button>
  </div>

  <a class="btn btn-primary" id="openBtn" hidden href="#">Open in Picklr</a>
  <a class="btn btn-secondary" href="https://apps.apple.com/app/id6770699126">Get Picklr on the App&nbsp;Store</a>

  <p class="hint" id="hint" hidden>Already have Picklr? Tap “Open in Picklr”, or enter the
  code under <b>Join League</b> in the app.</p>

  <div class="links">
    <a href="index.html">Picklr</a> ·
    <a href="privacy.html">Privacy</a> ·
    <a href="terms.html">Terms</a>
  </div>
</main>
<script>
  // Invite code arrives as ?c=CODE (see src/lib/invite.ts in the app repo).
  var code = (new URLSearchParams(location.search).get('c') || '')
    .toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12);
  if (code) {
    document.getElementById('codeText').textContent = code;
    document.getElementById('codeCard').hidden = false;
    document.getElementById('hint').hidden = false;
    var open = document.getElementById('openBtn');
    // Custom-scheme deep link: iOS asks "Open in Picklr?" when installed;
    // the App Store button right below covers everyone else.
    open.href = 'picklr://join/' + code;
    open.hidden = false;
    document.getElementById('copyBtn').addEventListener('click', function () {
      navigator.clipboard && navigator.clipboard.writeText(code);
      this.textContent = 'Copied!';
    });
  }
</script>
</body>
</html>
